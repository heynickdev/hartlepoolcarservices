services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
      POSTGRES_DB: ${DB_NAME:-hcs_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  migrations:
    image: ghcr.io/kukymbr/goose-docker:3.27.0
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${DB_USER:-admin}:${DB_PASSWORD:-supersecret}@db:5432/${DB_NAME:-hcs_db}?sslmode=disable
      - GOOSE_COMMAND=up
      - GOOSE_MIGRATION_DIR=/migrations
    depends_on:
      db:
        condition: service_started
    volumes:
      - ./db/migrations:/migrations
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://${DB_USER:-admin}:${DB_PASSWORD:-supersecret}@db:5432/${DB_NAME:-hcs_db}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DVLA_API_KEY=${DVLA_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - BASE_URL=${BASE_URL}
    depends_on:
      db:
        condition: service_started
    networks:
      - internal
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hcs-app.rule=Host(`hartlepoolcarservices.com`) ||
        Host(`www.hartlepoolcarservices.com`)"
      - "traefik.http.services.hcs-app.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.hcs-app.tls=true"

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

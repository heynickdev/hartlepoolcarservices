{{ template "header.html" . }}

<main class="flex-1">
  <section
    class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8"
  >
    <div class="max-w-md w-full space-y-8">
      <div>
        <div class="flex justify-center">
          <img
            src="/static/logo.png"
            alt="Hartlepool Car Services"
            class="h-12 w-auto dark:hidden"
          />
          <img
            src="/static/logo-white.png"
            alt="Hartlepool Car Services"
            class="h-12 w-auto hidden dark:inline"
          />
        </div>
        <h2
          class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white"
        >
          Reset your password
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
          Enter your email address and we'll send you a link to reset your
          password.
        </p>
      </div>

      <div class="bg-white dark:bg-gray-800 shadow-xl rounded-lg p-8">
        {{if .Error}}
        <div
          class="mb-4 p-4 bg-red-50 dark:bg-red-900/50 border border-red-200 dark:border-red-800 rounded-lg"
        >
          <div class="flex">
            <i class="fas fa-exclamation-circle text-red-400 mr-3 mt-0.5"></i>
            <p class="text-red-800 dark:text-red-200">{{.Error}}</p>
          </div>
        </div>
        {{end}} {{if .Success}}
        <div
          class="mb-4 p-4 bg-green-50 dark:bg-green-900/50 border border-green-200 dark:border-green-800 rounded-lg"
        >
          <div class="flex">
            <i class="fas fa-check-circle text-green-400 mr-3 mt-0.5"></i>
            <p class="text-green-800 dark:text-green-200">{{.Success}}</p>
          </div>
        </div>
        {{end}}

        <form
          method="POST"
          action="/forgot-password"
          class="space-y-6"
        >
          <div>
            <label
              for="email"
              class="block text-gray-700 dark:text-gray-300 font-medium mb-2"
              >Email Address</label
            >
            <div class="relative">
              <i
                data-feather="mail"
                class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>
              <input
                type="email"
                id="email"
                name="email"
                class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                placeholder="your@email.com"
                required
              />
            </div>
          </div>

          <div>
            <button
              type="submit"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50"
              id="submitBtn"
            >
              <i data-feather="send" class="mr-2"></i>
              <span id="submitText">Send Reset Link</span>
            </button>
          </div>
        </form>

        <script>
          // Simple form submission feedback
          document.querySelector('form').addEventListener('submit', function() {
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');

            submitBtn.disabled = true;
            submitText.textContent = 'Sending...';
          });
        </script>

        <div class="mt-6 flex justify-between text-sm">
          <a href="/resend-reset" class="text-blue-600 hover:text-blue-500">
            Resend Reset Link
          </a>
          <a href="/login" class="text-blue-600 hover:text-blue-500">
            Back to Login
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

{{ template "footer.html" . }}

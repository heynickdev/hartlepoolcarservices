{{ template "header.html" . }}

<main class="flex-1">
  <section
    class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8"
  >
    <div class="max-w-md w-full space-y-8">
      <div>
        <div class="flex justify-center">
          <img
            src="/static/logo.png"
            alt="Hartlepool Car Services"
            class="h-12 w-auto dark:hidden"
          />
          <img
            src="/static/logo-white.png"
            alt="Hartlepool Car Services"
            class="h-12 w-auto hidden dark:inline"
          />
        </div>
        <h2
          class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white"
        >
          Reset your password
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
          Enter your email address and we'll send you a link to reset your
          password.
        </p>
      </div>

      <div class="bg-white dark:bg-gray-800 shadow-xl rounded-lg p-8">
        {{if .Error}}
        <div
          class="mb-4 p-4 bg-red-50 dark:bg-red-900/50 border border-red-200 dark:border-red-800 rounded-lg"
        >
          <div class="flex">
            <i class="fas fa-exclamation-circle text-red-400 mr-3 mt-0.5"></i>
            <p class="text-red-800 dark:text-red-200">{{.Error}}</p>
          </div>
        </div>
        {{end}} {{if .Success}}
        <div
          class="mb-4 p-4 bg-green-50 dark:bg-green-900/50 border border-green-200 dark:border-green-800 rounded-lg"
        >
          <div class="flex">
            <i class="fas fa-check-circle text-green-400 mr-3 mt-0.5"></i>
            <p class="text-green-800 dark:text-green-200">{{.Success}}</p>
          </div>
        </div>
        {{end}}

        <form
          method="POST"
          action="/forgot-password"
          class="space-y-6"
          id="resetForm"
        >
          <div>
            <label
              for="email"
              class="block text-gray-700 dark:text-gray-300 font-medium mb-2"
              >Email Address</label
            >
            <div class="relative">
              <i
                data-feather="mail"
                class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>
              <input
                type="email"
                id="email"
                name="email"
                class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                placeholder="your@email.com"
                required
              />
            </div>
          </div>
          <div class="flex justify-center">
            <button type="button" id="resetBtn" class="noselect">
              <span>Send Reset Link</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
              >
                <path
                  d="M0 11c2.761.575 6.312 1.688 9 3.438 3.157-4.23 8.828-8.187 15-11.438-5.861 5.775-10.711 12.328-14 18.917-2.651-3.766-5.547-7.271-10-10.917z"
                />
              </svg>
            </button>
          </div>
        </form>

        <style>
          .noselect {
            width: 200px;
            height: 50px;
            background: none;
            border: 4px solid #3498db;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 100ms;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease-in-out;
          }

          .noselect:hover {
            transform: scale(1.05);
            animation:
              breathing 4s ease-in-out infinite,
              shadowPulse 10s cubic-bezier(0.34, 1.56, 0.64, 0.61) infinite;
          }

          @keyframes shadowPulse {
            0% {
              box-shadow: 0 0 20px rgba(16, 36, 64, 0.6); /* 1. Deep Navy */
            }
            50% {
              box-shadow: 0 0 45px rgba(135, 206, 250, 0.3); /* 4. Light Sky Blue */
            }
            100% {
              box-shadow: 0 0 20px rgba(16, 36, 64, 0.6); /* 6. Back to Deep Navy */
            }
          }
          /* Keyframes for the breathing effect */
          @keyframes breathing {
            0% {
              transform: scale(1);
            }
            50% {
              transform: scale(1.02); /* Made even more subtle */
            }
            100% {
              transform: scale(1);
            }
          }
          .noselect span,
          .noselect svg {
            position: absolute;
            color: #3498db;
            fill: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s ease;
          }

          .noselect:focus {
            outline: none;
            border: 2px solid #2980b9;
            width: 50px;
            border-left: 4px solid #2980b9;
            border-bottom: 4px solid #2980b9;
            animation: spin 2s 500ms forwards;
          }

          .noselect:focus span {
            color: transparent;
          }

          .noselect:focus svg {
            animation: check 500ms 2300ms forwards;
          }

          @keyframes spin {
            80% {
              border: 4px solid transparent;
              border-left: 4px solid #2980b9;
            }
            100% {
              transform: rotate(1080deg);
              border: 4px solid #2980b9;
            }
          }

          @keyframes check {
            to {
              fill: #27ae60;
            }
          }
        </style>

        <script>
          document
            .getElementById("resetBtn")
            .addEventListener("click", function (e) {
              e.preventDefault();

              const emailInput = document.getElementById("email");
              const email = emailInput.value.trim();

              // Validate email
              if (!email || !email.includes("@")) {
                alert("Please enter a valid email address");
                return;
              }

              // Trigger animation and start sending immediately
              this.focus();

              const formData = new FormData();
              formData.append("email", email);

              fetch("/forgot-password", {
                method: "POST",
                body: formData,
              })
                .then((response) => {
                  if (response.redirected) {
                    // Wait for animation to complete before redirecting
                    setTimeout(() => {
                      window.location.href = response.url;
                    }, 2000);
                  } else {
                    return response.text();
                  }
                })
                .then((html) => {
                  if (html) {
                    setTimeout(() => {
                      document.open();
                      document.write(html);
                      document.close();
                    }, 2000);
                  }
                })
                .catch((error) => {
                  console.error("Error:", error);
                  alert("An error occurred. Please try again.");
                });
            });
        </script>

        <div class="mt-6 text-center">
          <a href="/login" class="text-sm text-blue-600 hover:text-blue-500">
            Back to login
          </a>
        </div>
      </div>
    </div>
  </section>
</main>

{{ template "footer.html" . }}

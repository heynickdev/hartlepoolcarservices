<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="canonical"
      href="https://www.yourwebsite.com/{{.CanonicalURL}}"
    />
    <!-- Adjust {{.CanonicalURL}} dynamically -->

    <!-- SEO Title & Description -->
    <title>{{.Title}} | Hartlepool Car Services</title>
    <meta name="description" content="{{.MetaDescription}}" />
    <!-- Pass a unique description for each page -->

    <!-- Robots Tag - Tells search engines how to crawl -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{.Title}} | Hartlepool Car Services" />
    <meta property="og:description" content="{{.MetaDescription}}" />
    <meta
      property="og:image"
      content="https://www.yourwebsite.com/images/social-share-image.jpg"
    />
    <!-- A default image for sharing -->
    <meta
      property="og:url"
      content="https://www.yourwebsite.com/{{.CanonicalURL}}"
    />
    <meta property="og:site_name" content="Hartlepool Car Services" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{.Title}} | Hartlepool Car Services" />
    <meta name="twitter:description" content="{{.MetaDescription}}" />
    <meta
      name="twitter:image"
      content="https://www.yourwebsite.com/images/social-share-image.jpg"
    />

    <!-- Stylesheets -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Scripts (deferred for performance) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dark Mode FOUC Prevention -->
    <script>
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <!-- Structured Data (JSON-LD) for Local Business -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "AutoRepair",
        "name": "Hartlepool Car Services",
        "image": "https://www.yourwebsite.com/static/logo.png",
        "url": "https://www.yourwebsite.com/",
        "telephone": "+44-1429-123456",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Vehicle Lane",
          "addressLocality": "Hartlepool",
          "postalCode": "TS24 0AB",
          "addressCountry": "GB"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:30",
          "closes": "17:30"
        }
      }
    </script>
    <!-- Added Chart.js library -->
    <style>
      body {
        scroll-behavior: smooth;
      }
      .hero-bg {
        background:
          linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
          url("http://static.photos/automotive/1200x630/1");
        background-size: cover;
        background-position: center;
      }
      .service-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      .mobile-menu {
        display: none;
      }
      .mobile-menu.active {
        display: block;
      }
      .sidebar-minimized {
        width: 80px;
      }
      .sidebar-minimized .sidebar-text,
      .sidebar-minimized .logo-text,
      .sidebar-minimized .user-info {
        display: none;
      }
      .sidebar-minimized .nav-item {
        justify-content: center;
      }
    </style>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 font-sans leading-normal tracking-normal text-gray-800 dark:text-gray-200 ntialiased overflow-x-hidden"
  >
    <!-- Top Bar -->
    <div class="bg-gray-900 dark:bg-black text-white py-2 px-4">
      <div class="container mx-auto flex justify-between items-center">
        <div class="text-sm">
          <i data-feather="phone" class="inline-block w-4 h-4 mr-1"></i> Call
          us: <a class="hover:text-blue-600/50 dark:hover:text-blue-600" href="tel:+4407723652106">07723 652106</a>
        </div>
        <div class="flex space-x-4">
          {{if .IsAuthenticated}} {{if .User.IsAdmin}}
          <a
            href="/admin/dashboard"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Dashboard</a
          >
          <a
            href="/logout"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Logout</a
          >
          {{else}}
          <a
            href="/dashboard"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Dashboard</a
          >
          <a
            href="/logout"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Logout</a
          >
          {{end}} {{else}}
          <a
            href="/login"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Login</a
          >
          <a
            href="/signup"
            class="text-sm hover:text-blue-400 dark:hover:text-blue-500 transition"
            >Sign Up</a
          >
          {{end}}
        </div>
      </div>
    </div>
    <!-- Navigation -->
    <nav
      class="bg-white dark:bg-gray-800 shadow-md dark:border-b dark:border-gray-700 sticky top-0 z-50"
    >
      <div
        class="container mx-auto px-4 py-3 flex justify-between items-center"
      >
        <a href="/" class="flex items-center dark:hidden">
          <img
            src="/static/logo.png"
            alt="Hartlepool Car Services"
            class="h-12"
          />
        </a>
        <a href="/" class="flex items-center hidden dark:inline-block">
          <img
            src="/static/logo-white.png"
            alt="Hartlepool Car Services"
            class="h-12"
          />
        </a>
        <div class="hidden md:flex space-x-8">
          <a
            href="/"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition"
            >Home</a
          >
          <a
            href="/about"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition"
            >About</a
          >
          <a
            href="/services"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition"
            >Services</a
          >
          <a
            href="/contact"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition"
            >Contact</a
          >
        </div>
        <button id="mobile-menu-button" class="md:hidden focus:outline-none">
          <i data-feather="menu"></i>
        </button>
      </div>
      <!-- Mobile Menu -->
      <div
        id="mobile-menu"
        class="mobile-menu md:hidden bg-white dark:bg-gray-800 w-full px-4 pb-4"
      >
        <div class="flex flex-col space-y-3">
          <a
            href="/"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition py-2 border-b border-gray-100 dark:border-gray-700"
            >Home</a
          >
          <a
            href="/about"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition py-2 border-b border-gray-100 dark:border-gray-700"
            >About</a
          >
          <a
            href="/services"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition py-2 border-b border-gray-100 dark:border-gray-700"
            >Services</a
          >
          <a
            href="/contact"
            class="font-medium text-gray-800 hover:text-blue-600 dark:text-gray-200 dark:hover:text-blue-400 transition py-2"
            >Contact</a
          >
        </div>
      </div>
    </nav>
  </body>
</html>

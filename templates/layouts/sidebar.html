{{ define "sidebar" }}
<div
  class="hidden lg:block w-64 h-screen bg-white dark:bg-gray-800 shadow-sm border-r border-gray-200 dark:border-gray-700 pt-4"
>
  <div class="p-4">
    <nav class="space-y-2">
      <a
        href="/dashboard"
        class="flex items-center space-x-3 text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-900/50 px-4 py-2 rounded-lg"
      >
        <i class="fas fa-grip"></i>
        <span>Dashboard</span>
      </a>
      <a
        href="/add-car"
        class="flex items-center space-x-3 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-2 rounded-lg"
      >
        <i class="fas fa-plus-circle"></i>
        <span>Add Vehicle</span>
      </a>
      <a
        href="/profile"
        class="flex items-center space-x-3 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-2 rounded-lg"
      >
        <i class="fas fa-user-cog"></i>
        <span>Profile Settings</span>
      </a>
    </nav>
    <div
      class="flex-shrink-0 w-64 absolute left-0 bottom-0 py-4 border-t border-gray-200 dark:border-gray-700"
    >
      <div
        class="flex items-center space-x-3 px-4 py-3 text-gray-700 dark:text-gray-300"
      >
        <i class="fas fa-user-circle text-xl"></i>
        <span class="text-base font-medium">{{.User.Name}}</span>
      </div>
      <a
        href="/logout"
        class="sm:hidden inline flex items-center space-x-3 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/50 px-4 py-3 rounded-lg text-base font-medium w-full"
      >
        <i class="fas fa-sign-out-alt text-xl"></i>
        <span>Logout</span>
      </a>
    </div>
  </div>
</div>
{{ end }}

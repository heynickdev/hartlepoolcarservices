{{ template "header.html" . }}

<main class="flex-1">
    <section class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div>
                <div class="flex justify-center">
                    <img src="/static/logo.png" alt="Hartlepool Car Services" class="h-12 w-auto dark:hidden">
                    <img src="/static/logo-white.png" alt="Hartlepool Car Services" class="h-12 w-auto hidden dark:inline">
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white">
                    Set new password
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
                    Enter your new password below.
                </p>
            </div>

            <div class="bg-white dark:bg-gray-800 shadow-xl rounded-lg p-8">
                {{if .Error}}
                <div class="mb-4 p-4 bg-red-50 dark:bg-red-900/50 border border-red-200 dark:border-red-800 rounded-lg">
                    <div class="flex">
                        <i class="fas fa-exclamation-circle text-red-400 mr-3 mt-0.5"></i>
                        <p class="text-red-800 dark:text-red-200">{{.Error}}</p>
                    </div>
                </div>
                {{end}}

                {{if .Success}}
                <div class="mb-4 p-4 bg-green-50 dark:bg-green-900/50 border border-green-200 dark:border-green-800 rounded-lg">
                    <div class="flex">
                        <i class="fas fa-check-circle text-green-400 mr-3 mt-0.5"></i>
                        <p class="text-green-800 dark:text-green-200">{{.Success}}</p>
                    </div>
                </div>
                {{end}}

                <form method="POST" action="/reset-password" class="space-y-6">
                    <input type="hidden" name="token" value="{{.Token}}">
                    <div>
                        <label for="password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">New Password</label>
                        <div class="relative">
                            <i data-feather="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="password" name="password" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="••••••••" minlength="6" required>
                        </div>
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Confirm New Password</label>
                        <div class="relative">
                            <i data-feather="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="confirm_password" name="confirm_password" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="••••••••" minlength="6" required>
                        </div>
                    </div>
                    <div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition duration-300 flex items-center justify-center">
                            <i data-feather="key" class="mr-2"></i>
                            <span>Reset Password</span>
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <a href="/login" class="text-sm text-blue-600 hover:text-blue-500">
                        Back to login
                    </a>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;

    if (password !== confirmPassword) {
        e.preventDefault();
        alert('Passwords do not match. Please try again.');
        return false;
    }
});
</script>

    <!-- Signup Form -->
    <section class="py-16 bg-gray-50 dark:bg-gray-900">
        <div class="container mx-auto px-4">
            <div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-8 rounded-lg signup-card">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2">Get Started</h2>
                    <p class="text-gray-600 dark:text-gray-400">Create your account in just a few steps</p>
                </div>

                {{if .Error}}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                    <strong class="font-bold">Error: </strong>
                    <span class="block sm:inline">{{.Error}}</span>
                </div>
                {{end}}

                <form method="POST" action="/signup" class="space-y-4">
                    <div>
                        <label for="name" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Full Name</label>
                        <div class="relative">
                            <i data-feather="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="name" name="name" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" required>
                        </div>
                    </div>
                    <div>
                        <label for="email" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Email Address</label>
                        <div class="relative">
                            <i data-feather="mail" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="email" name="email" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div>
                        <label for="phone" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Phone Number</label>
                        <div class="relative">
                            <i data-feather="phone" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="tel" id="phone" name="phone" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="+44 123 456 7890" required>
                        </div>
                    </div>
                    <div>
                        <label for="password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Password</label>
                        <div class="relative">
                            <i data-feather="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="password" name="password" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Confirm Password</label>
                        <div class="relative">
                            <i data-feather="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="confirm_password" name="confirm_password" class="w-full pl-10 py-2 border border-gray-300 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded transition duration-300 flex items-center justify-center">
                            <i data-feather="user-plus" class="mr-2"></i>
                            <span>Create Account</span>
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        Already have an account?
                        <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </section>
</main>
{{template "footer.html" .}}

<script>
    // Password confirmation validation for signup
    document.addEventListener('DOMContentLoaded', function() {
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm_password');
        const form = document.querySelector('form[action="/signup"]');

        function validatePasswords() {
            if (password.value !== confirmPassword.value) {
                confirmPassword.setCustomValidity('Passwords do not match');
                return false;
            } else {
                confirmPassword.setCustomValidity('');
                return true;
            }
        }

        password.addEventListener('input', validatePasswords);
        confirmPassword.addEventListener('input', validatePasswords);

        form.addEventListener('submit', function(e) {
            if (!validatePasswords()) {
                e.preventDefault();
                alert('Passwords do not match. Please check your password and confirmation.');
                return false;
            }
        });
    });
</script>
